<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — 팀 선택</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <header class="bg-white border-b px-6 py-3 flex justify-between items-center">
    <span class="bg-teal-600 text-white font-bold px-3 py-1 rounded">TaskFlow</span>
    <div class="flex items-center gap-4">
      <span id="user-email" class="text-sm text-gray-500"></span>
      <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-500">로그아웃</button>
    </div>
  </header>

  <main class="max-w-2xl mx-auto mt-10 px-4">
    <div id="no-team-banner" class="bg-blue-50 border border-blue-200 text-blue-700 text-sm rounded-lg px-4 py-3 mb-6">
      아직 팀에 소속되지 않았습니다. 팀을 만들거나 초대코드로 합류하세요.
    </div>

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Create Team -->
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <h2 class="font-semibold text-gray-800 mb-4">+ 새 팀 만들기</h2>
        <form onsubmit="handleCreateTeam(event)" class="space-y-3">
          <input type="text" id="team-name" placeholder="팀 이름 (1–30자)" maxlength="30" required
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
          <div id="create-error" class="hidden text-red-500 text-xs"></div>
          <button type="submit" id="create-btn"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium py-2 rounded-lg transition disabled:opacity-60">
            만들기
          </button>
        </form>
        <!-- Invite code display -->
        <div id="invite-display" class="hidden mt-4 bg-green-50 border border-green-200 rounded-lg p-4">
          <p class="text-sm text-green-700 font-medium mb-2">✓ 팀이 생성되었습니다!</p>
          <p class="text-xs text-gray-500 mb-1">초대코드 (멤버에게 공유)</p>
          <div class="flex items-center gap-2">
            <span id="invite-code" class="font-mono text-lg font-bold text-teal-700 tracking-widest"></span>
            <button onclick="copyCode()" class="text-xs bg-gray-100 hover:bg-gray-200 px-2 py-1 rounded">📋 복사</button>
          </div>
          <button onclick="goToKanban()" class="mt-3 w-full bg-teal-600 text-white text-sm py-2 rounded-lg">
            칸반 시작하기 →
          </button>
        </div>
      </div>

      <!-- Join Team -->
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <h2 class="font-semibold text-gray-800 mb-4">초대코드로 합류</h2>
        <form onsubmit="handleJoin(event)" class="space-y-3">
          <input type="text" id="invite-input" placeholder="ABCD-1234" maxlength="9" oninput="formatCode(this)"
            class="w-full border rounded-lg px-3 py-2 text-sm font-mono uppercase tracking-widest focus:outline-none focus:ring-2 focus:ring-teal-400" />
          <div id="join-error" class="hidden text-red-500 text-xs"></div>
          <button type="submit" id="join-btn"
            class="w-full bg-teal-600 hover:bg-teal-700 text-white text-sm font-medium py-2 rounded-lg transition disabled:opacity-60">
            합류
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script>
    const user = requireAuth();
    if (user?.team_id) location.href = "/kanban.html";
    document.getElementById("user-email").textContent = user?.email || "";

    function formatCode(input) {
      let val = input.value.replace(/[^A-Z0-9]/gi, "").toUpperCase();
      if (val.length > 4) val = val.slice(0, 4) + "-" + val.slice(4, 8);
      input.value = val;
    }

    function logout() {
      localStorage.clear();
      location.href = "/index.html";
    }

    async function handleCreateTeam(e) {
      e.preventDefault();
      document.getElementById("create-error").classList.add("hidden");
      const btn = document.getElementById("create-btn");
      btn.disabled = true; btn.textContent = "처리 중…";
      try {
        const data = await api.post("/teams", { name: document.getElementById("team-name").value });
        const u = getUser(); u.team_id = data.id; localStorage.setItem("user", JSON.stringify(u));
        document.getElementById("invite-code").textContent = data.invite_code;
        document.getElementById("invite-display").classList.remove("hidden");
        btn.textContent = "만들기"; btn.disabled = false;
      } catch (err) {
        document.getElementById("create-error").textContent = err.message || "팀 생성에 실패했습니다";
        document.getElementById("create-error").classList.remove("hidden");
        btn.disabled = false; btn.textContent = "만들기";
      }
    }

    async function handleJoin(e) {
      e.preventDefault();
      const code = document.getElementById("invite-input").value;
      const errEl = document.getElementById("join-error");
      errEl.classList.add("hidden");
      if (!/^[A-Z]{4}-[0-9]{4}$/.test(code)) {
        errEl.textContent = "형식이 올바르지 않습니다 (예: ABCD-1234)";
        errEl.classList.remove("hidden"); return;
      }
      const btn = document.getElementById("join-btn");
      btn.disabled = true; btn.textContent = "처리 중…";
      try {
        const data = await api.post("/teams/join", { invite_code: code });
        const u = getUser(); u.team_id = data.team.id; localStorage.setItem("user", JSON.stringify(u));
        location.href = "/kanban.html";
      } catch (err) {
        errEl.textContent = err.message || "합류에 실패했습니다";
        errEl.classList.remove("hidden");
        btn.disabled = false; btn.textContent = "합류";
      }
    }

    function copyCode() {
      navigator.clipboard.writeText(document.getElementById("invite-code").textContent);
    }

    function goToKanban() { location.href = "/kanban.html"; }
  </script>
</body>
</html>
